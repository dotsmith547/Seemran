<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥰 A Question For Seemran 💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#c77dff);
    overflow:hidden;
    color:white;
    text-align:center;
}

.container{
    width:90%;
    max-width:600px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:25px;
    z-index:10;
}

h1{
    font-size:2.5rem;
    margin-bottom:20px;
}

p{
    font-size:1.2rem;
    margin-bottom:25px;
    line-height:1.6;
}

button{
    border:none;
    padding:15px 25px;
    margin:10px;
    border-radius:50px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.yes{
    background:white;
    color:#ff4d6d;
}

.no{
    background:#ff4d6d;
    color:white;
}

.heart{
    position:fixed;
    bottom:-50px;
    animation:float linear infinite;
    z-index:0;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

@media(max-width:600px){

h1{
    font-size:2rem;
}

p{
    font-size:1rem;
}

}
</style>
</head>
<body>

<audio id="bgMusic" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container" id="box">

<h1>💝 Will You Be Mine Forever? 💖</h1>

<p id="text">
I have a very important question for you... 💖
</p>

<div id="buttons">
<button class="yes" onclick="yesClicked()">YES ️💞💝</button>
<button class="no" onclick="noClicked()">NO 😏</button>
</div>

</div>

<script>

// MUSIC

window.addEventListener("load", () => {

    const music = document.getElementById("bgMusic");

    music.play().catch(() => {

        document.body.addEventListener("click", () => {
            music.play();
        }, { once:true });

    });

});

// NO BUTTON STORY

let step = 0;

const messages = [
"Are you sure? 🥺",
"Sach mein? 😭",
"Ek baar aur soch lo... ❤️",
"System Error: NO not accepted 😜",
"The NO button is getting tired 😂",
"Last chance to change your mind 😏",
"NO option is currently under maintenance ❤️"
];

function noClicked(){

    if(step < messages.length){

        document.getElementById("text").innerHTML =
        messages[step];

        step++;

    }else{

        document.getElementById("text").innerHTML =
        "Nice try 😜<br><br>Only one option is available now ❤️";

        document.getElementById("buttons").innerHTML = `
        <button class="yes" onclick="yesClicked()">
        YES ❤️
        </button>
        `;
    }
}

// YES BUTTON

function yesClicked(){

    document.getElementById("box").innerHTML = `
    <h1>🥰💖 YAYYYYY ❤️</h1>

    <p>
    You just made Vimal very happy! 💞<br><br>

    Thank you for being so special. ❤️<br><br>

    Forever and always 🌹
    </p>

    <h2>💞💝Vimal Loves Seemran ❤️</h2>
    `;

    for(let i=0;i<120;i++){

        let heart=document.createElement("div");

        heart.classList.add("heart");
        heart.innerHTML="❤️";

        heart.style.left=Math.random()*100+"%";
        heart.style.fontSize=(15+Math.random()*35)+"px";
        heart.style.animationDuration=(4+Math.random()*6)+"s";

        document.body.appendChild(heart);
    }
}

</script>

</body>
</html>
